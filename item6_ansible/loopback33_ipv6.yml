---
- name: Configurar Loopback33 IPv6
  hosts: routers
  gather_facts: no

  tasks:
    - name: Crear Loopback33 IPv6
      ios_config:
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
          - no shutdown
        parents: interface Loopback33
